<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History — CodeLens</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f; --surface: #111118; --card: #16161f; --border: #1e1e2e;
            --accent: #00ff88; --accent2: #0066ff; --accent3: #ff3366;
            --text: #e0e0f0; --muted: #5a5a7a; --warn: #ffaa00;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }

        .sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); height: 100vh; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; z-index: 100; }
        .sidebar-logo { padding: 1.5rem; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 1.1rem; color: var(--accent); }
        .sidebar-logo span { color: var(--text); }
        .sidebar-nav { flex: 1; padding: 1rem 0; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: var(--muted); text-decoration: none; font-size: 0.9rem; transition: all 0.15s; cursor: pointer; border: none; background: none; width: 100%; }
        .nav-item:hover, .nav-item.active { background: rgba(0,102,255,0.1); color: var(--text); border-left: 2px solid var(--accent2); }
        .nav-item i { width: 18px; text-align: center; }
        .sidebar-user { padding: 1rem 1.5rem; border-top: 1px solid var(--border); }
        .user-avatar { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent2), var(--accent)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; color: white; }
        .btn-logout { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; cursor: pointer; }
        .btn-logout:hover { border-color: var(--accent3); color: var(--accent3); }

        .main { margin-left: 240px; padding: 2rem; }
        .page-header { margin-bottom: 2rem; }
        .page-header h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 4px; }
        .page-header p { color: var(--muted); font-size: 0.9rem; }

        .history-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .history-card:hover { border-color: var(--accent2); transform: translateX(4px); }

        .score-badge {
            width: 56px; height: 56px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .score-good { background: rgba(0,255,136,0.1); color: var(--accent); border: 1px solid rgba(0,255,136,0.3); }
        .score-ok { background: rgba(255,170,0,0.1); color: var(--warn); border: 1px solid rgba(255,170,0,0.3); }
        .score-bad { background: rgba(255,51,102,0.1); color: var(--accent3); border: 1px solid rgba(255,51,102,0.3); }

        .history-meta { flex: 1; }
        .history-code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--muted);
            background: var(--surface);
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 500px;
        }

        .lang-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(0,102,255,0.1);
            border: 1px solid rgba(0,102,255,0.3);
            color: var(--accent2);
            padding: 3px 10px;
            border-radius: 100px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
        }

        .date-text { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--muted); }

        .stars-display { color: var(--warn); font-size: 0.85rem; }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--muted);
        }

        .empty-state i { font-size: 3rem; margin-bottom: 1rem; display: block; opacity: 0.3; }

        .btn-new-review {
            background: linear-gradient(135deg, var(--accent2), #0044cc);
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-new-review:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,102,255,0.4); color: white; }

        /* Modal */
        .modal-content { background: var(--card); border: 1px solid var(--border); }
        .modal-header { border-bottom: 1px solid var(--border); }
        .modal-footer { border-top: 1px solid var(--border); }
        .modal-title { font-family: 'JetBrains Mono', monospace; color: var(--text); }
        .btn-close { filter: invert(1); }

        .modal-code {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #a0a0c0;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }

        .modal-issue {
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.88rem;
        }

        .modal-issue:last-child { border-bottom: none; }

        .severity-pill {
            display: inline-flex;
            padding: 2px 8px;
            border-radius: 100px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .pill-high { background: rgba(255,51,102,0.15); color: #ff3366; }
        .pill-medium { background: rgba(255,170,0,0.15); color: #ffaa00; }
        .pill-low { background: rgba(0,255,136,0.15); color: #00ff88; }

        .pagination-wrap { display: flex; gap: 8px; justify-content: center; margin-top: 2rem; }
        .page-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
        .page-btn:hover, .page-btn.active { background: var(--accent2); border-color: var(--accent2); color: white; }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">CodeLens<span>AI</span></div>
        <nav class="sidebar-nav">
            <a class="nav-item" onclick="window.location.href='/dashboard'"><i class="fas fa-code"></i> Code Review</a>
            <a class="nav-item active"><i class="fas fa-history"></i> History</a>
            <a class="nav-item" onclick="window.location.href='/dashboard'"><i class="fas fa-chart-bar"></i> Analytics</a>
        </nav>
        <div class="sidebar-user">
            <div class="d-flex align-items-center gap-2 mb-2">
                <div class="user-avatar" id="userAvatar">SP</div>
                <div>
                    <div style="font-size:0.85rem;font-weight:600" id="userName">Loading...</div>
                    <div style="font-size:0.72rem;color:var(--muted)">Developer</div>
                </div>
            </div>
            <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt me-1"></i>Logout</button>
        </div>
    </div>

    <div class="main">
        <div class="page-header d-flex align-items-center justify-content-between">
            <div>
                <h1>Review History</h1>
                <p>All your past code reviews</p>
            </div>
            <a href="/dashboard" class="btn-new-review"><i class="fas fa-plus me-2"></i>New Review</a>
        </div>

        <div id="historyList"></div>
        <div class="pagination-wrap" id="pagination"></div>
    </div>

    <!-- Detail Modal -->
    <div class="modal fade" id="detailModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Review Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API = 'http://localhost:8080';
        let token = localStorage.getItem('token');
        let currentPage = 0;

        if (!token) window.location.href = '/';

        const userName = localStorage.getItem('userName') || 'User';
        document.getElementById('userName').textContent = userName;
        document.getElementById('userAvatar').textContent = userName.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);

        loadHistory(0);

        async function loadHistory(page) {
            try {
                const res = await fetch(`${API}/api/reviews?page=${page}&size=10`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) { logout(); return; }
                const data = await res.json();
                renderHistory(data.content || []);
                renderPagination(data.totalPages || 0, page);
                currentPage = page;
            } catch (e) {
                document.getElementById('historyList').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i>Could not load history. Make sure all services are running.</div>`;
            }
        }

        function renderHistory(reviews) {
            const container = document.getElementById('historyList');
            if (reviews.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-code"></i>
                        <h4 style="color:var(--text);margin-bottom:8px">No reviews yet</h4>
                        <p style="margin-bottom:1.5rem">Submit your first code review to see it here</p>
                        <a href="/dashboard" class="btn-new-review">Start Reviewing →</a>
                    </div>`;
                return;
            }

            container.innerHTML = reviews.map(r => {
                const score = r.overallScore ?? '?';
                const scoreClass = score >= 70 ? 'score-good' : score >= 40 ? 'score-ok' : 'score-bad';
                const stars = r.userRating ? '★'.repeat(r.userRating) + '☆'.repeat(5 - r.userRating) : '';
                const date = r.createdAt ? new Date(r.createdAt).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }) : '';
                return `
                <div class="history-card" onclick="loadDetail(${r.id})">
                    <div class="score-badge ${scoreClass}">${score}</div>
                    <div class="history-meta">
                        <div class="d-flex align-items-center gap-2 mb-1">
                            <span class="lang-tag"><i class="fas fa-code"></i>${r.language}</span>
                            <span class="date-text">${date}</span>
                            ${stars ? `<span class="stars-display">${stars}</span>` : ''}
                        </div>
                        <div class="history-code">${r.codeSnippet || ''}</div>
                    </div>
                    <i class="fas fa-chevron-right" style="color:var(--muted)"></i>
                </div>`;
            }).join('');
        }

        function renderPagination(totalPages, current) {
            if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
            let html = `<button class="page-btn" onclick="loadHistory(${current - 1})" ${current === 0 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i></button>`;
            for (let i = 0; i < totalPages; i++) {
                html += `<button class="page-btn ${i === current ? 'active' : ''}" onclick="loadHistory(${i})">${i + 1}</button>`;
            }
            html += `<button class="page-btn" onclick="loadHistory(${current + 1})" ${current === totalPages - 1 ? 'disabled' : ''}><i class="fas fa-chevron-right"></i></button>`;
            document.getElementById('pagination').innerHTML = html;
        }

        async function loadDetail(reviewId) {
            try {
                const res = await fetch(`${API}/api/reviews/${reviewId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                document.getElementById('modalTitle').textContent = `${data.language} Review — Score: ${data.overallScore ?? 'N/A'}`;

                const issuesHtml = (data.issues && data.issues.length > 0)
                    ? data.issues.map(i => `
                        <div class="modal-issue">
                            <span class="severity-pill pill-${i.severity?.toLowerCase()}">${i.severity}</span>
                            <span style="font-size:0.72rem;color:var(--muted);margin-left:6px;font-family:'JetBrains Mono',monospace">${i.type}</span>
                            <div style="margin-top:4px">${i.description}</div>
                            ${i.lineHint ? `<div style="font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--muted);margin-top:2px"><i class="fas fa-map-pin"></i> ${i.lineHint}</div>` : ''}
                        </div>`).join('')
                    : '<div style="color:var(--accent)"><i class="fas fa-check-circle me-2"></i>No issues found</div>';

                const suggestionsHtml = (data.suggestions && data.suggestions.length > 0)
                    ? data.suggestions.map((s, i) => `<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:0.88rem"><span style="color:var(--accent2);margin-right:8px;font-family:'JetBrains Mono',monospace">${i + 1}.</span>${s}</div>`).join('')
                    : '<div style="color:var(--muted)">No suggestions available</div>';

                document.getElementById('modalBody').innerHTML = `
                    ${data.summary ? `<div style="margin-bottom:1rem;padding:1rem;background:var(--surface);border-radius:8px;font-size:0.9rem">${data.summary}</div>` : ''}
                    <div style="font-family:'JetBrains Mono',monospace;font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px">Code</div>
                    <div class="modal-code">${escapeHtml(data.codeSnippet || '')}</div>
                    <div style="font-family:'JetBrains Mono',monospace;font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:1rem 0 8px">Issues</div>
                    ${issuesHtml}
                    <div style="font-family:'JetBrains Mono',monospace;font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:1rem 0 8px">Suggestions</div>
                    ${suggestionsHtml}
                `;

                new bootstrap.Modal(document.getElementById('detailModal')).show();
            } catch (e) {
                alert('Could not load review details');
            }
        }

        function escapeHtml(text) {
            return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function logout() { localStorage.clear(); window.location.href = '/'; }
    </script>
</body>
</html>
