server:
  port: 8081

spring:
  application:
    name: user-service

  # H2 In-Memory Database - no installation needed!
  datasource:
    url: jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  # H2 Console (optional - view data at http://localhost:8081/h2-console)
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: "CodeReviewAssistantSecretKey2024SuperSecureKey123!"
  expiration: 86400000
