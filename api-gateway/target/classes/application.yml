server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**
          filters:
            - JwtAuthFilter

        - id: review-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/reviews/**
          filters:
            - JwtAuthFilter

        - id: frontend
          uri: http://localhost:8083
          predicates:
            - Path=/**

      # FIX: use add-to-simple-url-handler-mapping to properly handle preflight OPTIONS
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:8083"
              - "http://localhost:8080"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false
            maxAge: 3600

jwt:
  secret: "CodeReviewAssistantSecretKey2024SuperSecureKey123!"

management:
  endpoints:
    web:
      exposure:
        include: health,info
